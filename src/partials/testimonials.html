<section id="testimonials">
  <div class="container testimonials-container">
    <h2 class="title-glob testimonials-title" data-aos="fade-up">
      Customer testimonials
    </h2>
    <p class="testimonials-text" data-aos="fade-up" data-aos-delay="100">
      Absolutely love my new earrings! They are stunning.
    </p>

    <ul class="testimonials-list">
      <li class="testimonials-item">
        <picture data-aos="fade-up">
          <source
            media="(min-width: 1440px)"
            srcset="
              /img/testimonial/desc/serenity.jpg   1x,
              /img/testimonial/desc/serenity2x.jpg 2x
            "
          />
          <source
            media="(min-width: 768px)"
            srcset="
              /img/testimonial/tab/serenity.jpg   1x,
              /img/testimonial/tab/serenity2x.jpg 2x
            "
          />
          <source
            media="(max-width: 767px)"
            srcset="
              /img/testimonial/mob/serenity.jpg   1x,
              /img/testimonial/mob/serenity2x.jpg 2x
            "
          />
          <img
            src="/img/testimonial/mob/serenity.jpg"
            alt="Serenity"
            width="335"
            class="testimonials-item-img"
          />
        </picture>

        <picture data-aos="fade-up" data-aos-delay="100">
          <source
            media="(min-width: 1440px)"
            srcset="
              /img/testimonial/desc/heritage.jpg   1x,

            alt="Heritage"
            width="335"
            class="testimonials-item-img"
          />
        </picture>

        <div class="testimonials-item-content" data-aos="fade-up" data-aos-delay="200">
          <div class="testimonials-icon-wrapper">
            <svg width="24" height="24" class="testimonials-icon">
              <use href="/img/symbol-defs.svg#icon-star-fiiled"></use>
            </svg>
            <svg width="24" height="24" class="testimonials-icon">
              <use href="/img/symbol-defs.svg#icon-star-fiiled"></use>

            <svg width="24" height="24" class="testimonials-icon">

            </svg>

          <p class="testimonials-review-text">
            "Each piece tells a story, and I love mine!"
          </p>
          <p class="testimonials-review-author">Thomas Mans</p>
        </div>
      </li>
      <li class="testimonials-item">

        <picture data-aos="fade-up" data-aos-delay="100">
